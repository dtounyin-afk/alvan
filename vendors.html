<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vendeurs — ModaAfrik Cameroun</title>
  <meta name="description" content="Découvrez les 500+ vendeurs artisans indépendants de ModaAfrik Cameroun. Filtrez par ville et trouvez votre créateur préféré."/>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'"/>
  <link rel="stylesheet" href="assets/css/main.css"/>
  <link rel="stylesheet" href="assets/css/vendors.css"/>
</head>
<body>
<header class="header" id="header">
  <nav class="navbar">
    <a href="index.html" class="logo">
      <div class="logo-mark"><svg width="14" height="14" viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="#f5f0e8"/></svg></div>
      ModaAfrik
    </a>
    <div class="nav-search">
      <input type="text" placeholder="Rechercher un vendeur…" id="vendorSearch" oninput="filterVendors(this.value)" autocomplete="off"/>
      <button onclick="filterVendors(document.getElementById('vendorSearch').value)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
    </div>
    <div class="nav-actions">
      <a href="#contact-admin" class="btn-vendor">Vendre</a>
      <a href="auth.html" class="nav-icon" title="Compte"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
      <a href="cart.html" class="nav-icon cart-icon" title="Panier"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="cart-badge" id="cartBadge">0</span></a>
    </div>
  </nav>
  <div class="nav-cats">
    <div class="nav-cats-inner">
      <a href="shop.html?cat=robes-pagnes">Robes &amp; Pagnes</a>
      <a href="shop.html?cat=boubous">Boubous</a>
      <a href="shop.html?cat=hommes">Hommes</a>
      <a href="shop.html?cat=enfants">Enfants</a>
      <a href="shop.html?cat=accessoires">Accessoires</a>
      <a href="shop.html?cat=bijoux">Bijoux</a>
      <a href="shop.html?cat=chaussures">Chaussures</a>
      <a href="vendors.html" class="active">Vendeurs</a>
    </div>
  </div>
</header>

<main class="container vendors-page">
  <div class="vendors-hero">
    <h1>Nos <em>Vendeurs</em></h1>
    <p>500+ créateurs indépendants de toute l'Afrique</p>
  </div>
  <div class="vendors-filters" id="cityFilters">
    <button class="size-tag active" onclick="filterCity('',this)">Tous</button>
    <button class="size-tag" onclick="filterCity('Douala',this)">📍 Douala</button>
    <button class="size-tag" onclick="filterCity('Yaoundé',this)">📍 Yaoundé</button>
    <button class="size-tag" onclick="filterCity('Dakar',this)">📍 Dakar</button>
    <button class="size-tag" onclick="filterCity('Lagos',this)">📍 Lagos</button>
    <button class="size-tag" onclick="filterCity('Abidjan',this)">📍 Abidjan</button>
    <button class="size-tag" onclick="filterCity('Accra',this)">📍 Accra</button>
    <button class="size-tag" onclick="filterCity('Conakry',this)">📍 Conakry</button>
    <button class="size-tag" onclick="filterCity('Bamako',this)">📍 Bamako</button>
  </div>
  <div class="vendors-big-grid" id="vendorsGrid"></div>
</main>

<footer class="footer" style="margin-top:60px">
  <div class="footer-bottom"><div class="container footer-bottom-inner"><span>© 2025 ModaAfrik Cameroun</span></div></div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
<script src="assets/js/api.js" defer></script>
<script src="assets/js/data.js" defer></script>
<script src="assets/js/cart.js" defer></script>
<script src="assets/js/vendors.js" defer></script>
</body>
</html>
